<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso | La Tiendita Martínez</title>
  <meta name="description" content="Ingreso al sistema La Tiendita Martínez">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="card">

      <header class="card__header">
        <div class="brand-line"></div>

        <img
          src="logo-tiendiita.png"
          alt="Logo La Tiendita Martínez"
          class="card__logo"
        >

        <p style="font-size:1rem; color:var(--texto-secundario); margin-bottom:6px;">
          Sistema de acceso
        </p>

        <h1 class="card__title">Iniciar sesión</h1>

        <p class="card__subtitle">
          Ingresa con tu usuario y contraseña para acceder al sistema.
        </p>
      </header>

      <!-- ── FORMULARIO ── -->
      <div class="form">

        <!-- Mensaje de error -->
        <div id="mensaje" style="display:none; color:red; margin-bottom:10px; font-size:0.9rem;"></div>

        <div class="form__row">
          <label for="usuario">Usuario</label>
          <input
            type="text"
            id="usuario"
            name="usuario"
            placeholder="Escribe tu usuario"
            autocomplete="username"
            required
            minlength="3"
            maxlength="50"
          >
          <small class="form__hint">Debe tener entre 3 y 50 caracteres.</small>
        </div>

        <div class="form__row">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Escribe tu contraseña"
            autocomplete="current-password"
            required
            minlength="6"
            maxlength="100"
          >
          <small class="form__hint">Debe tener mínimo 6 caracteres.</small>
        </div>

        <div class="form__check">
          <input type="checkbox" id="recordar" name="recordar">
          <label for="recordar">Recordar sesión</label>
        </div>

        <div class="form__actions">
          <button type="button" id="btnEntrar" class="btn btn--primary">
            🔐 Entrar
          </button>
          <button type="reset" class="btn btn--secondary">
            🧹 Limpiar
          </button>
        </div>

        <div class="links-extra">
          <a href="/recuperar">¿Olvidaste tu contraseña?</a>
          &nbsp;|&nbsp;
          <a href="/registro">Crear nuevo registro</a>
        </div>

      </div>

      <footer class="card__footer">
        <p class="footer__text">© 2026 La Tiendita Martínez</p>
      </footer>

    </section>
  </main>

  <script src="js/login_script.js"></script>
</body>
</html>
